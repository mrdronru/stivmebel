<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
  }
  .post {
    position: relative;
    width: 1080px;
    height: 1350px;
    background-image: url('tg_bg.jpg');
    background-size: cover;
    background-position: center top;
  }
  .darklayer {
    position: absolute;
    top: 780px;
    left: 0;
    width: 1080px;
    height: 570px;
    background: linear-gradient(
      to bottom,
      rgba(15,13,11,0) 0%,
      rgba(15,13,11,0.72) 18%,
      rgba(15,13,11,0.90) 32%,
      rgba(15,13,11,0.90) 100%
    );
  }
  .logo {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-family: 'Georgia', serif;
    font-size: 38px;
    color: #FFFFFF;
    white-space: nowrap;
    background: rgba(15,13,11,0.45);
    padding: 14px 48px;
    border-radius: 4px;
  }
  .logo em {
    font-style: italic;
    color: #E0BC85;
  }
  .content {
    position: absolute;
    top: 580px;
    left: 0;
    right: 0;
    padding: 0 80px;
    text-align: center;
  }
  .eyebrow {
    display: none;
  }
  .headline {
    font-family: 'Georgia', serif;
    font-size: 72px;
    font-weight: 400;
    line-height: 1.18;
    color: #FAF9F6;
    margin-bottom: 28px;
  }
  .sub {
    font-size: 40px;
    font-weight: 600;
    line-height: 1.5;
    color: rgba(250,249,246,1);
    margin-bottom: 48px;
    max-width: 820px;
    margin-left: auto;
    margin-right: auto;
  }
  .cta-button {
    display: inline-block;
    background: #B8975A;
    color: #1A1814;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 26px 64px;
    margin-bottom: 28px;
  }
  .phone {
    font-size: 38px;
    font-weight: 400;
    letter-spacing: 1px;
    color: #FAF9F6;
    margin-bottom: 12px;
  }
  .site {
    font-size: 34px;
    font-weight: 400;
    color: #D4B07A;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="post">
    <div class="darklayer"></div>
    <div class="logo">Стив <em>Интерьеры</em></div>
    <div class="content">
      <div class="eyebrow">Кухни &middot; Шкафы &middot; Гардеробные</div>
      <div class="headline">Новая кухня или шкаф под ключ без нервотрёпки</div>
      <div class="sub">Замер и 3Д проект бесплатно. Оставляем за собой красоту и порядок.</div>
      <div class="cta-button">Посмотрите наши работы</div>
      <div class="phone">+7 (969) 256-23-23</div>
      <div class="site">stivmebel.ru</div>
    </div>
  </div>
</body>
</html>
